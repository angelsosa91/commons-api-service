  name: commons-api-service-svc
  #namespace: prod
spec:
  ports:
    - targetPort: 8080
      port: 80
  selector:
    app: commons-api-service
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: commons-api-service
  #namespace: prod
  labels:
    account: springboottemplate