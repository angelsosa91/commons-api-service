server:
  servlet:
    context-path: /commons

spring:
  profiles:
    active: ${PROFILE}
  application:
    name: commons-api-service
    group: solar
  cloud:
    config:
      fail-fast: true
      uri: ${CONFIG_SERVER_URI}
      request-read-timeout: 60000
      request-connect-timeout: 60000
    vault:
      uri: ${VAULT_URI}
      profileSeparator: '/'
      timeout: 10
      authentication: TOKEN
      token: ${VAULT_TOKEN}